name: chargepet
description: "ChargePet — phone charging behavior visualized as a pet narrative."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lottie: ^3.1.0        # Pet animations (5 Lottie JSON files)
  intl: ^0.19.0         # Date formatting for timeline
  google_fonts: ^6.2.1  # Space Grotesk (Neo-Brutalist RPG font)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0         # Dart test package for scoring engine unit tests

flutter:
  uses-material-design: true

  assets:
    - assets/data/users.json
    - assets/animations/pet_thriving.json
    - assets/animations/pet_happy.json
    - assets/animations/pet_tired.json
    - assets/animations/pet_sick.json
    - assets/animations/pet_critical.json
